#--------------------------------------------------------------------
#
# KLIPPER CONFIG FILE FOR BigTreeTech TFT CONTROLLERS
#
# Pre-configured for use with Klipper firmware.
# Copy this file to your TFT SD card root renamed as "config.ini".
#
# Also required on your Pi:
#   - Copy klipper/klipper_tft.cfg to ~/printer_data/config/
#   - Add [include klipper_tft.cfg] to printer.cfg
#
# See klipper/mainboard_port.md for wiring and port selection help.
# See klipper/remote_host.md for remote print control and layer tracking.
#
#--------------------------------------------------------------------


#--------------------------------------------------------------------
# Supported TFT Variants
#--------------------------------------------------------------------
#
# BIGTREE_TFT24_V1_1    / BIGTREE_TFT28_V1_0 / BIGTREE_TFT28_V3_0
# BIGTREE_TFT35_V1_0    / BIGTREE_TFT35_V1_1 / BIGTREE_TFT35_V1_2
# BIGTREE_TFT35_V2_0    / BIGTREE_TFT35_V3_0 / BIGTREE_TFT35_E3_V3_0
# BIGTREE_TFT35_B1_V3_0 / BIGTREE_TFT43_V3_0 / BIGTREE_TFT50_V3_0
# BIGTREE_TFT70_V3_0
#
# BIGTREE_GD_TFT24_V1_1    / BIGTREE_GD_TFT35_V2_0    / BIGTREE_GD_TFT35_V3_0
# BIGTREE_GD_TFT35_E3_V3_0 / BIGTREE_GD_TFT35_B1_V3_0 / BIGTREE_GD_TFT43_V3_0
# BIGTREE_GD_TFT50_V3_0    / BIGTREE_GD_TFT70_V3_0
#
# MKS_TFT28_V3_0 / MKS_TFT28_V4_0 / MKS_TFT28_NEW_GENIUS
# MKS_TFT32_V1_3 / MKS_TFT32_V1_4 / MKS_TFT32L_V3_0
# MKS_TFT35_V1_0
#
# MKS_GD_TFT28_V1_2_4


#--------------------------------------------------------------------
# General Settings
#--------------------------------------------------------------------

#### Serial Ports (Primary and Supplementary)
# Baud rate for each physical UART port (P1–P4). Set the port wired
# to your Pi to option 8 (250000). Disable all others with 0.
# KLIPPER NOTE: No OctoPrint or ESP3D needed — only the Pi port is used.
#   Options: [OFF: 0, 2400: 1, 9600: 2, 19200: 3, 38400: 4, 57600: 5,
#             115200: 6, 230400: 7, 250000: 8, 500000: 9, 921600: 10, 1000000: 11]
serial_port:P1:0 P2:0 P3:8 P4:0

#### Mainboard Serial Port
# Which physical port the TFT uses as the mainboard connection.
# KLIPPER NOTE: Set this to whichever port is wired to the Pi UART.
#   Production wiring (P1 → Pi, mainboard on USB):  serial_port:P1:8  mainboard_port:1
#   Testing wiring  (P1 → mainboard, P3 → Pi):      serial_port:P3:8  mainboard_port:3
#   See klipper/mainboard_port.md for full wiring guide.
#   Options: [P1: 1, P2: 2, P3: 3, P4: 4]
mainboard_port:3

#### TX Slots
# Max G-code TX slots (only used when advanced_ok is enabled).
#   Value range: [min: 2, max: 16]
tx_slots:2

#### TX Delay
# Minimum delay (ms) between consecutive G-codes sent to the mainboard.
# KLIPPER NOTE: Leave at 0. Increase to 1–2 only if Klipper logs
# malformed command errors during TFT SD card prints.
#   Value range: [min: 0, max: 10]
tx_delay:0

#### TX Prefetch
# Pre-fetch the next G-code from TFT SD card while the current one is in-flight.
# KLIPPER NOTE: Leave enabled. Disable only if malformed command errors appear
# during TFT SD card prints.
#   Options: [disable: 0, enable: 1]
tx_prefetch:0

#### Advanced OK
# Use ADVANCED_OK slot counts from the mainboard to pipeline G-code transmissions.
# KLIPPER NOTE: Must be disabled. Klipper returns plain "ok" with no slot count;
# enabling this causes the TFT to stall waiting for slot info that never arrives.
#   Options: [disable: 0, enable: 1]
advanced_ok:0

#### Command Checksum
# Prefix each G-code with a line number and checksum (e.g. "N1 G28*18").
# KLIPPER NOTE: Must be disabled. Klipper does not support this format;
# every command will be rejected as malformed if this is enabled.
#   Options: [disable: 0, enable: 1]
command_checksum:0

#### Emulated M600
# TFT intercepts M600 (filament change) and handles it locally.
# Keep enabled — Klipper's M600 macro in klipper_tft.cfg calls PAUSE.
#   Options: [disable: 0, enable: 1]
emulated_m600:1

#### Emulated M109 And M190
# TFT converts blocking M109/M190 to non-blocking M104/M140 and polls
# M105 to show a heating progress bar while waiting.
# Keep enabled — prevents the TFT from freezing during heat-up.
#   Options: [disable: 0, enable: 1]
emulated_m109_m190:1

#### Event LED
# TFT periodically sets the printer's neopixel / knob LED color based on
# current nozzle and bed temperatures during TFT SD card prints.
#   Options: [disable: 0, enable: 1]
event_led:1

#### G-code File Comment Parsing
# Parse print time and layer info from slicer comments in the G-code file.
# Enable if your slicer (e.g. Cura) embeds this info in comments.
#   Options: [disable: 0, enable: 1]
file_comment_parsing:1


#--------------------------------------------------------------------
# UI Settings
#--------------------------------------------------------------------

#### Rotated UI
# Rotate the touch-mode UI 180 degrees.
#   Options: [disable: 0, enable: 1]
rotated_ui:0

#### Touch Mode Language
# Language displayed in Touch Mode. Option 1 requires a language pack
# .ini file copied to the SD root and a reset to flash it.
#   Options: [Primary Language (english): 0, Secondary Language: 1]
language:0

#### Status Screen
# If enabled, Status Screen is the default home screen instead of Main Menu.
# Status Screen shows temperatures, fan, speed, and printer notifications.
#   Options: [disable: 0, enable: 1]
status_screen:1

#### Touch Mode Colors
# Colors for UI elements. Use a preset number or an RGB888 hex value (prefix "0x"),
# e.g. Red: 0xFF0000.
#   Options: [ WHITE: 0,  BLACK: 1,  RED: 2,  GREEN: 3,      BLUE: 4,       CYAN: 5,  MAGENTA: 6,    YELLOW: 7,
#             ORANGE: 8, PURPLE: 9, LIME: 10, BROWN: 11, DARKBLUE: 12, DARKGREEN: 13,    GRAY: 14, DARKGRAY: 15]

## Title background color
title_background_color:1

## Menu background color
menu_background_color:1

## Menu font color
menu_font_color:0

## Reminder font color (e.g. "No print attached", "Busy processing")
reminder_font_color:2

## Status font color (e.g. "Card inserted", "Card removed")
status_font_color:5

## Background color for X Y Z position display in Status Screen
status_xyz_bg_color:15

## List view border color
list_border_color:15

## List view button background color
list_button_bg_color:15

## Mesh editor minimum value color
mesh_min_color:7

## Mesh editor maximum value color
mesh_max_color:2

#### Terminal Text Color Scheme
#   Options: [Material Dark: 0, Material Light: 1, High Contrast: 2]
terminal_color_scheme:0

#### Notification Style For ACK Messages
# How "echo:" ACK messages from the printer are shown.
#   Options: [OFF: 0, POPUP: 1, TOAST: 2]
#     OFF:   Silently discard.
#     POPUP: Blocking popup requiring user confirmation.
#     TOAST: Non-blocking toast for a few seconds.
ack_notification:0

#### Files Sorting
# Sort order for files on TFT SD card / USB disk.
#   Options: [Date Newest First: 0, Date Oldest First: 1, Name Ascending: 2, Name Descending: 3]
files_sort_by:0

#### Files List Mode
# Show files as a list rather than icons.
#   Options: [disable: 0, enable: 1]
files_list_mode:1

#### Filename Extension
# Show full filename including extension in file lists.
# If disabled, extensions starting with ".g" / ".G" are hidden.
#   Options: [disable: 0, enable: 1]
filename_extension:1

#### Fan Speed In Percentage
# Display fan speed as percentage. If disabled, shows raw PWM value.
#   Options: [disable: 0, enable: 1]
fan_speed_percentage:1

#### Persistent Temperature Info
# Show temperature info in all menus, not just the status screen.
#   Options: [disable: 0, enable: 1]
persistent_info:0

#### Temperature And Wait ACK In Terminal
# Show temperature poll and wait responses in the Terminal menu.
#   Options: [disable: 0, enable: 1]
terminal_ack:0

#### Notification M117
# Store //action:notification messages in the notification history screen.
# Notifications are always shown on the Status Screen regardless of this setting.
#   Options: [disable: 0, enable: 1]
notification_m117:1

#### Progress Source
# Source for the print progress percentage.
#   File mode: percentage of G-codes executed (simple byte position).
#   Time mode:  time-based estimate from slicer M73/comment data.
#               Falls back to file mode if slicer data is absent.
#   Options: [File mode: 0, Time mode: 1]
prog_source:1

#### Progress Numeric Display Mode During Print
# What numbers are shown next to the progress bar. Cycled by pressing the hourglass icon.
#   Options: [Percentage & Elapsed time: 0, Percentage & Remaining time: 1, Elapsed time & Remaining time: 2]
prog_disp_type:2

#### Current Layer Display Mode During Print
# How the current layer is shown. Requires file_comment_parsing enabled.
# Cycled by pressing the nozzle icon.
#   Options: [Layer height: 0, Layer number: 1, Both - height & number: 2]
layer_disp_type:2


#--------------------------------------------------------------------
# Marlin Mode Settings (only for TFT24 V1.1 & TFT28/TFT35/TFT43/TFT50/TFT70 V3.0)
#--------------------------------------------------------------------

#### Default Mode
# Mode shown at startup. Touch Mode is the primary interface for Klipper.
# Long-press the screen (1.5 s) to switch modes unless Blocked.
#   Options: [Marlin Mode: 0, Touch Mode: 1, Blocked Marlin Mode: 2, Blocked Touch Mode: 3]
default_mode:1

#### Serial Always ON
# Keep UART alive in Marlin Mode. Not needed for Klipper.
#   Options: [disable: 0, enable: 1]
serial_always_on:0

#### Marlin Mode Background & Font Colors
# Colors used in Marlin Mode (the text console view).
# Use a preset number or RGB888 hex value (prefix "0x").
#   Options: [ WHITE: 0, BLACK: 1, RED: 2, GREEN: 3, BLUE: 4, CYAN: 5, MAGENTA: 6, YELLOW: 7,
#             ORANGE: 8, PURPLE: 9, LIME: 10, BROWN: 11, DARKBLUE: 12, DARKGREEN: 13, GRAY: 14, DARKGRAY: 15]

## Marlin Mode background color
marlin_background_color:1

## Marlin Mode font color
marlin_font_color:0

#### Fullscreen Marlin Mode
# Run Marlin Mode in fullscreen (no borders).
#   Options: [disable: 0, enable: 1]
marlin_fullscreen:0

#### Show Marlin Mode Title
# Show a banner text at the top of the screen in Marlin Mode.
#   Options: [disable: 0, enable: 1]
marlin_show_title:0

#### Marlin Mode Title
# Banner text shown at the top in Marlin Mode. Max 20 characters.
marlin_title:Klipper

#### Marlin Mode Type
# Terminal emulation layout used in Marlin Mode.
#   Options: [128x64 Full Graphic LCD: 0, 20x4 Character LCD: 1]
marlin_type:0


#--------------------------------------------------------------------
# Printer / Machine Settings
#--------------------------------------------------------------------

#### Hotend Count
#   Value range: [min: 0, max: 6]
hotend_count:1

#### Heated Bed Support
# Enable/disable heated bed. Disable to let the TFT auto-detect from firmware.
#   Options: [disable: 0, enable: 1]
heated_bed:1

#### Heated Chamber Support
# Enable/disable heated chamber. Disable to let the TFT auto-detect from firmware.
#   Options: [disable: 0, enable: 1]
heated_chamber:0

#### Extruder Count
# Overridden by firmware if reported. Value range: [min: 0, max: 6]
ext_count:1

#### Fan Count
#   Value range: [min: 1, max: 6]
fan_count:1

#### Controller Fan Support
# Enable controller fan speed control (requires M710 support on mainboard).
#   Options: [disable: 0, enable: 1]
controller_fan:0

#### Bed / Extruder / Chamber Maximum Temperatures
# Safety limits for temperature display and input.
#   Format: [max_temp: T0:<°C> T1:<°C> ... BED:<°C> CHAMBER:<°C>]
max_temp:T0:275 T1:275 T2:275 T3:275 T4:275 T5:275 BED:150 CHAMBER:60

#### Cold Extrusion Minimum Temperature
# Minimum nozzle temperature before extrusion/retraction is allowed.
#   Unit: [°C]  Value range: [min: 20, max: 1000]
min_temp:150

#### Fan Maximum PWM Speed
# Maximum PWM value for each cooling fan and controller fan channel.
#   Format: [fan_max: F0:<PWM> ... F5:<PWM> CtA:<PWM> CtI:<PWM>]
#   Value range: [min: 25, max: 255]
fan_max:F0:255 F1:255 F2:255 F3:255 F4:255 F5:255 CtA:255 CtI:255

#### Machine Size / Build Area
# KLIPPER NOTE: Klipper does not report geometry. Set these to your
# actual build volume — they are not auto-detected.
#   Format: [size_min: X<mm> Y<mm> Z<mm>]  [size_max: X<mm> Y<mm> Z<mm>]
size_min:X0 Y0 Z0
size_max:X350 Y350 Z400

#### X & Y Move Speeds/Feedrates (Move menu)
#   Format: [xy_speed: S<slow> N<normal> F<fast>]  Unit: [mm/min]
xy_speed:S1000 N3000 F5000

#### Z Speeds/Feedrates (Move menu)
#   Format: [z_speed: S<slow> N<normal> F<fast>]  Unit: [mm/min]
z_speed:S500 N1000 F2000

#### Extruder Speeds/Feedrates
#   Format: [ext_speed: S<slow> N<normal> F<fast>]  Unit: [mm/min]
ext_speed:S60 N600 F1200

#### Auto Load Bed Leveling Data
# Send M420 S1 at boot to restore a saved mesh from EEPROM.
# KLIPPER NOTE: Keep disabled. The M115 macro reports Cap:EEPROM:0 which
# suppresses M420 S1 at boot. Restore mesh in your START_PRINT macro instead
# with: BED_MESH_PROFILE LOAD=default
#   Options: [disable: 0, enable: 1]
auto_load_leveling:0

#### Onboard / Printer Media Support
# Enable/disable printer-side SD card access (Marlin onboard SD).
# KLIPPER NOTE: Keep disabled. Klipper has no onboard SD in the Marlin sense;
# enabling this causes the TFT to send M21/M33 and wait for a response that
# never comes. Use the TFT's own SD card for local file printing.
#   Options: [disable: 0, enable: 1, auto-detect: 2]
onboard_sd:0

#### M27 Printing Status Refresh Time
# How often (seconds) M27 is polled for print progress when SD_AUTOREPORT
# is not detected. Value range: [min: 1, max: 100]
M27_refresh_time:3

#### M27 Always Active
# Poll M27 even when not printing (needed for remote/host-started prints).
#   Options: [disable: 0, enable: 1]
M27_always_active:1

#### Long File Names Support
# KLIPPER NOTE: Keep disabled. Klipper does not support the Marlin long
# filename protocol (M33), and onboard_sd is disabled.
#   Options: [disable: 0, enable: 1, auto-detect: 2]
long_filename:0

#### Pause / Nozzle Park Settings
# Used when a print is paused or when the nozzle is parked for (un)load or tuning.

## Retract on pause / purge on resume lengths (mm)
#   Format: [pause_retract: R<retract> P<purge>]  Value range: [min: 0.0, max: 20.0]
pause_retract:R15.0 P16.0

## Park XY position (mm). Use >= 0 for Cartesian, <= 0 for Delta.
#   Format: [pause_pos: X<pos> Y<pos>]
pause_pos:X10.0 Y10.0

## Z raise on pause, relative to current layer (mm). Value range: [min: 0.0, max: 2000.0]
pause_z_raise:10.0

## Feedrates used when parking / resuming (mm/min).
#   Format: [pause_feedrate: XY<rate> Z<rate> E<rate>]
pause_feedrate:XY6000 Z6000 E600

#### Leveling Settings

## Inset distance from bed edges for manual leveling points (mm).
#   Value range: [min: 0, max: 2000]
level_edge_distance:20

## Z position for manual leveling / MBL (absolute mm for leveling, relative mm for ABL tuning).
#   Value range: [min: 0.0, max: 2000.0]
level_z_pos:0.2

## Z raise between leveling points (mm). Value range: [min: 0.0, max: 2000.0]
level_z_raise:10.0

## Feedrates during leveling procedures (mm/min).
#   Format: [level_feedrate: XY<rate> Z<rate>]
level_feedrate:XY6000 Z6000

#### Inverted Axes
# Invert axis direction in Move, Manual Leveling, Leveling Corner, and Probe Offset menus.
# LY is a separate Y-leveling inversion for printers where bed and nozzle move opposite.
#   Format: [X<0/1> Y<0/1> Z<0/1> LY<0/1>]
inverted_axis:X0 Y0 Z0 LY0

#### Probing For Z Offset
# If enabled, probes bed center after homing before moving to the XY probe point.
# If disabled, moves directly to XY homing point (use when probe IS the Z endstop).
#   Options: [disable: 0, enable: 1]
probing_z_offset:1

#### Probing Z Raise
# Z raise after homing before probing a point. Use positive for Cartesian, negative for Delta.
#   Unit: [mm]  Value range: [min: -2000.0, max: 2000.0]
probing_z_raise:20.0

#### Z Steppers Auto-Alignment (ABL)
# Show G34 icon in ABL menu to align dual Z steppers using the probe.
#   Options: [disable: 0, enable: 1]
z_steppers_alignment:0

#### TouchMI Settings (ABL)
# Show TouchMI sensor controls (Init, Z Offset, Save, Test) in ABL menu.
#   Options: [disable: 0, enable: 1]
touchmi_sensor:0

#### Preheat Temperatures
# Up to 10 named preheat presets (extend by adding preheat_name_7 / preheat_temp_7 etc.).
#   Format: preheat_temp_X: T<hotend °C> B<bed °C>
#   Hotend range: [min: 20, max: 1000]   Bed range: [min: 20, max: 400]
preheat_name_1:PLA
preheat_temp_1:T200 B60

preheat_name_2:PETG
preheat_temp_2:T240 B70

preheat_name_3:ABS
preheat_temp_3:T230 B90

preheat_name_4:WOOD
preheat_temp_4:T170 B50

preheat_name_5:TPU
preheat_temp_5:T220 B50

preheat_name_6:NYLON
preheat_temp_6:T250 B90


#--------------------------------------------------------------------
# Power Supply Settings (only if connected to TFT controller)
#--------------------------------------------------------------------

#### Active HIGH Power Supply Logic
# Signal level that keeps the power supply ON.
#   Options: [disable: 0, enable: 1]
ps_active_high:1

#### Power Supply Auto Shutdown Mode
# Automatically shut down after printing when hotend cools below ps_auto_shutdown_temp.
#   Options: [disable: 0, enable: 1, auto-detect: 2]
ps_auto_shutdown:0

#### Power Supply Auto Shutdown Temperature
# Hotend temperature threshold for auto-shutdown. Fans run until this temp is reached.
#   Unit: [°C]  Value range: [min: 20, max: 1000]
ps_auto_shutdown_temp:50


#--------------------------------------------------------------------
# Filament Runout Settings (only if connected to TFT controller)
#--------------------------------------------------------------------

# NOTE: If your filament sensor is wired to the mainboard (not the TFT):
#   1) Set fil_runout:0 to disable TFT-side handling.
#   2) Configure the sensor in Klipper (filament_switch_sensor).

#### Filament Runout Sensor Type
# Normal = simple switch sensor. Smart = encoder-disc SFS (e.g. BTT SFS).
#   Options: [Normal Disabled: 0, Normal Enabled: 1, Smart Disabled: 2, Smart Enabled: 3]
fil_runout:0

#### Inverted Filament Runout Sensor Logic
# Enable if runout is triggered by a HIGH signal.
#   Options: [disable: 0, enable: 1]
fil_runout_inverted:0

#### NC (Normal Close) Filament Runout Sensor
#   Options: [Normal Open: 0, Normal Close: 1]
fil_runout_nc:1

#### Filament Runout Noise Threshold
# Runout must be continuously detected for this many ms before triggering a pause.
#   Unit: [ms]  Value range: [min: 10, max: 1800]
fil_runout_noise_threshold:100

#### Smart Filament Runout Detection Distance
# For SFS sensors: filament must stop moving for this distance (mm) before pause triggers.
# Only used when fil_runout is 2 or 3.
#   Unit: [mm]  Value range: [min: 1, max: 50]
fil_runout_distance:7


#--------------------------------------------------------------------
# Power Loss Recovery & BTT UPS Settings
#--------------------------------------------------------------------

#### Power Loss Recovery Mode
# If enabled, a recovery file is written to TFT SD card during printing and used
# to resume after a power failure. Disable if you see read errors on TFT SD.
#   Options: [disable: 0, enable: 1]
pl_recovery:1

#### Power Loss Recovery Homing
# Home axes before restoring a power-loss recovery print.
#   Options: [disable: 0, enable: 1]
pl_recovery_home:0

#### Power Loss Recovery Z Raise
# Raise Z by this amount before restoring (BTT UPS only).
#   Unit: [mm]  Value range: [min: 0.0, max: 2000.0]
pl_recovery_z_raise:10.0

#### BTT Mini UPS Support
# Enable to use BTT Mini UPS for a controlled Z raise on power loss.
#   Options: [disable: 0, enable: 1]
btt_mini_ups:0


#--------------------------------------------------------------------
# Other Device-Specific Settings
#--------------------------------------------------------------------

#### Sounds / Buzzer
# Error sounds always play regardless of these settings.
#   touch_sound:  Touch feedback beep.
#   toast_sound:  All toast notification sounds.
#   alert_sound:  Popup, alert, and print-finish sounds.
#   heater_sound: Beep when a heater reaches its target temperature.
#   Options: [disable: 0, enable: 1]
touch_sound:1
toast_sound:1
alert_sound:1
heater_sound:1

#### LCD Brightness Levels (only for TFT28/TFT35/TFT43/TFT50/TFT70 V3.0)
#   Options: [OFF: 0, 5%: 1, 10%: 2, 20%: 3, 30%: 4, 40%: 5, 50%: 6, 60%: 7, 70%: 8, 80%: 9, 90%: 10, 100%: 11]

## Normal brightness level
lcd_brightness:11

## Brightness level when idle (screen dimmed after lcd_idle_time)
lcd_idle_brightness:5

#### LCD Idle Time (only for TFT28/TFT35/TFT43/TFT50/TFT70 V3.0)
# Screen dims to lcd_idle_brightness after this period of no touch input.
#   Options: [OFF: 0, 5sec: 1, 10sec: 2, 30sec: 3, 1min: 4, 2min: 5, 5min: 6, 10min: 7]
lcd_idle_time:4

#### LCD Lock On Idle (only for TFT28/TFT35/TFT43/TFT50/TFT70 V3.0)
# First touch when dimmed restores brightness only (no action triggered).
# Encoder knob always restores brightness without locking.
#   Options: [disable: 0, enable: 1]
lcd_lock_on_idle:0

#### LED Color
# Printer LED color used by Event LED and PID processes.
#   Format: [led_color: R:<0-255> G:<0-255> B:<0-255> W:<0-255> P:<0-255> I:<0-255>]
#   R/G/B: color channels   W: white (NEOPIXEL/RGBW)   P: intensity (NEOPIXEL)   I: index (NEOPIXEL)
led_color:R:255 G:255 B:255 W:255 P:255 I:255

#### LED Always ON
# Keep printer LED on at startup and after Event LED / PID processes end.
#   Options: [disable: 0, enable: 1]
led_always_on:0

#### Knob LED Color (only for TFT28/TFT35_E3/TFT43/TFT50/TFT70 V3.0)
# Knob LED color at startup.
#   Options: [OFF: 0, WHITE: 1, RED: 2, ORANGE: 3, YELLOW: 4, GREEN: 5, BLUE: 6, INDIGO: 7, VIOLET: 8]
knob_led_color:0

#### Knob LED Idle State (only for TFT28/TFT35_E3/TFT43/TFT50/TFT70 V3.0)
# Switch knob LED off when LCD is idle (dimmed).
#   Options: [disable: 0, enable: 1]
knob_led_idle:1

#### Knob LED Pixels (only for TFT28/TFT35_E3/TFT43/TFT50/TFT70 V3.0)
# Number of LEDs in a strip connected to the Neopixel port. 0 = hardware default.
#   Value range: [min: 0, max: 200]
neopixel_pixels:0


#--------------------------------------------------------------------
# Custom G-code Commands
#--------------------------------------------------------------------
#
# Up to 15 buttons shown in the Custom menu.
# Remove the leading "#" to enable a slot; add it back to disable.
# Max 75 characters each for label and G-code. Use \n for line breaks.
#
# Klipper notes:
#   G28, G29, M420, M500 are handled by klipper_tft.cfg macros.
#   FIRMWARE_RESTART is a native Klipper command.
#   M303 E0 S200 runs PID autotune on the hotend (from klipper_tft.cfg).
#
custom_label_1:Disable steppers
custom_gcode_1:M84\n

custom_label_2:Home all axes
custom_gcode_2:G28\n

custom_label_3:Run bed mesh
custom_gcode_3:G29\n

custom_label_4:Restore bed mesh
custom_gcode_4:M420 S1\n

custom_label_5:Save config
custom_gcode_5:M500\n

custom_label_6:Firmware restart
custom_gcode_6:FIRMWARE_RESTART\n

custom_label_7:PID tune hotend
custom_gcode_7:M303 E0 S200\n

#custom_label_8:custom8
#custom_gcode_8:M105\n
#custom_label_9:custom9
#custom_gcode_9:M105\n
#custom_label_10:custom10
#custom_gcode_10:M105\n
#custom_label_11:custom11
#custom_gcode_11:M105\n
#custom_label_12:custom12
#custom_gcode_12:M105\n
#custom_label_13:custom13
#custom_gcode_13:M105\n
#custom_label_14:custom14
#custom_gcode_14:M105\n
#custom_label_15:custom15
#custom_gcode_15:M105\n


#--------------------------------------------------------------------
# Start, End & Cancel G-code Commands
#--------------------------------------------------------------------
#
# G-codes run by the TFT before/after TFT SD card prints.
# NOTE: If your filament sensor is wired to the mainboard, add M75 to
# start_gcode and M77 to end_gcode to start/stop the Marlin runout timer.
#

#### Start G-code Status
# NOTE: M75 (Marlin print timer start) from your Marlin config has no Klipper equivalent.
# Disabled here — add any TFT-side pre-print actions if needed.
#   Options: [disable: 0, enable: 1]
start_gcode_enabled:0

#### End G-code Status
# NOTE: M77 (Marlin print timer stop) from your Marlin config has no Klipper equivalent.
# Disabled here — Klipper handles end-of-print cleanup in your END_PRINT macro.
#   Options: [disable: 0, enable: 1]
end_gcode_enabled:0

#### Cancel G-code Status
#   Options: [disable: 0, enable: 1]
cancel_gcode_enabled:0

#### Start G-code (runs before print if start_gcode_enabled:1)
#   Max 75 characters. Use \n for line breaks.
start_gcode:G28 XY R20\n

#### End G-code (runs after print completes if end_gcode_enabled:1)
end_gcode:M104 S0\nM140 S0\nM107\nM18\n

#### Cancel G-code (runs on print cancel if cancel_gcode_enabled:1)
cancel_gcode:M104 S0\nM140 S0\nG28 XY R10\nM107\nM18\n
