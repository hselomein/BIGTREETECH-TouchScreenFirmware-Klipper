# klipper_tft.cfg
# Drop-in Klipper config for BTT TFT35 touch mode compatibility.
# Add to printer.cfg with: [include klipper_tft.cfg]
#
# Required hardware: TFT35 UART connected to Pi GPIO serial (e.g. /dev/ttyAMA0)
# Required Klipper serial config:
#   [virtual_sdcard]
#   path: ~/printer_data/gcodes
#
#   [display_status]
#
#   [pause_resume]

# ============================================================
# FIRMWARE IDENTIFICATION
# The TFT sends M115 on boot and reads FIRMWARE_NAME: to detect
# Klipper. This macro outputs that string in the expected format.
# ============================================================

[gcode_macro M115]
description: Report firmware info and capabilities in Marlin-compatible format for TFT35
rename_existing: M115.1
gcode:
  RESPOND MSG="FIRMWARE_NAME:Klipper SOURCE_CODE_URL:https://github.com/Klipper3d/klipper"
  RESPOND MSG="Cap:EEPROM:0"
  RESPOND MSG="Cap:AUTOREPORT_TEMP:0"
  RESPOND MSG="Cap:BUILD_PERCENT:1"
  RESPOND MSG="Cap:SOFTWARE_POWER:0"
  {% if 'bed_mesh' in printer %}
    RESPOND MSG="Cap:AUTOLEVEL:1"
    RESPOND MSG="Cap:LEVELING_DATA:1"
  {% else %}
    RESPOND MSG="Cap:AUTOLEVEL:0"
    RESPOND MSG="Cap:LEVELING_DATA:0"
  {% endif %}
  {% if 'probe' in printer or 'bltouch' in printer %}
    RESPOND MSG="Cap:Z_PROBE:1"
  {% else %}
    RESPOND MSG="Cap:Z_PROBE:0"
  {% endif %}

# ============================================================
# TEMPERATURE REPORTING
# TFT polls M105 and expects Marlin colon format: T:nnn /nnn B:nnn /nnn
# This override formats Klipper's temp data to match.
# ============================================================

[gcode_macro M105]
description: Report temperatures in Marlin-compatible format for TFT35
rename_existing: M105.1
gcode:
  {% set t = printer.extruder %}
  {% set b = printer.heater_bed %}
  RESPOND MSG="T:{t.temperature:.1f} /{t.target:.1f} B:{b.temperature:.1f} /{b.target:.1f} @:0 B@:0"

# ============================================================
# POSITION REPORTING
# TFT sends M114 and parses: X:n Y:n Z:n E:n Count X:n Y:n Z:n
# ============================================================

[gcode_macro M114]
description: Report position in Marlin-compatible format for TFT35
rename_existing: M114.1
gcode:
  {% set p = printer.toolhead.position %}
  RESPOND MSG="X:{p.x:.2f} Y:{p.y:.2f} Z:{p.z:.2f} E:{p.e:.2f} Count X:{p.x:.0f} Y:{p.y:.0f} Z:{p.z:.0f}"

# ============================================================
# PRINT PROGRESS
# TFT sends M27 during a print and parses: SD printing byte n/n
# ============================================================

[gcode_macro M27]
description: Report print progress in Marlin SD format for TFT35
gcode:
  {% set ps = printer.print_stats %}
  {% if ps.state == "printing" or ps.state == "paused" %}
    {% set size = ps.file_size|int %}
    {% set pos  = ps.file_position|int %}
    RESPOND MSG="SD printing byte {pos}/{size}"
  {% else %}
    RESPOND MSG="Not SD printing"
  {% endif %}

# ============================================================
# EEPROM STUBS
# Klipper has no EEPROM. M503 is called by the TFT on boot;
# we stub it so the TFT gets an ok and moves on.
# M500 maps to SAVE_CONFIG. M501/M502 are no-ops.
# ============================================================

[gcode_macro M503]
description: Stub M503 (no EEPROM in Klipper)
gcode:
  RESPOND MSG="ok"

[gcode_macro M500]
description: Save Klipper config (equivalent to EEPROM save)
gcode:
  SAVE_CONFIG

[gcode_macro M501]
description: Stub M501 (Klipper reads config at startup only)
gcode:
  RESPOND MSG="ok"

[gcode_macro M502]
description: Stub M502 (no factory reset in Klipper)
gcode:
  RESPOND MSG="ok"

# ============================================================
# BED LEVELING
# G29 triggers mesh calibration.
# M420 S1 loads the default mesh profile; M420 S0 clears it.
# ============================================================

[gcode_macro G29]
description: Run bed mesh calibration
gcode:
  BED_MESH_CALIBRATE

[gcode_macro M420]
description: Enable/disable bed mesh in Marlin-compatible way
gcode:
  {% set s = params.S|default(-1)|int %}
  {% if s == 1 %}
    BED_MESH_PROFILE LOAD=default
  {% elif s == 0 %}
    BED_MESH_CLEAR
  {% else %}
    {% set state = "ON" if printer.bed_mesh.profile_name != "" else "OFF" %}
    RESPOND MSG="Bed leveling state: {state}"
  {% endif %}

# ============================================================
# Z OFFSET / BABYSTEPPING
# M290 Z adjusts Z offset live during a print.
# M851 Z sets the absolute Z offset.
# ============================================================

[gcode_macro M290]
description: Babystep Z offset (live adjustment)
gcode:
  {% set z = params.Z|default(0)|float %}
  SET_GCODE_OFFSET Z_ADJUST={z} MOVE=1

[gcode_macro M851]
description: Get or set probe Z offset
gcode:
  {% if params.Z is defined %}
    SET_GCODE_OFFSET Z={params.Z|float}
  {% else %}
    {% set zo = printer.gcode_move.homing_origin.z %}
    RESPOND MSG="Probe Z Offset: {zo:.3f}"
  {% endif %}

# ============================================================
# PRINT CONTROL
# Maps Marlin SD print control commands to Klipper equivalents.
# ============================================================

[gcode_macro M0]
description: Pause print
gcode:
  PAUSE

[gcode_macro M1]
description: Pause print
gcode:
  PAUSE

[gcode_macro M24]
description: Resume print
gcode:
  RESUME

[gcode_macro M25]
description: Pause print
gcode:
  PAUSE

[gcode_macro M524]
description: Abort print
gcode:
  CANCEL_PRINT

# ============================================================
# FILAMENT CHANGE
# M600 pauses and signals a filament change.
# Customize M701/M702 with your own load/unload sequence.
# ============================================================

[gcode_macro M600]
description: Filament change — pause and prompt user
gcode:
  PAUSE
  M117 Filament change

[gcode_macro M701]
description: Load filament — customize this sequence for your setup
gcode:
  M117 Loading filament...
  # Add your filament load moves here, e.g.:
  # G91
  # G1 E50 F300
  # G90

[gcode_macro M702]
description: Unload filament — customize this sequence for your setup
gcode:
  M117 Unloading filament...
  # Add your filament unload moves here, e.g.:
  # G91
  # G1 E-50 F300
  # G90

# ============================================================
# PID TUNING
# M303 E0 = hotend, M303 E-1 = bed.
# ============================================================

[gcode_macro M303]
description: PID autotune mapped to Klipper PID_CALIBRATE
gcode:
  {% set e = params.E|default(0)|int %}
  {% set s = params.S|default(200)|int %}
  {% if e >= 0 %}
    PID_CALIBRATE HEATER=extruder TARGET={s}
  {% else %}
    PID_CALIBRATE HEATER=heater_bed TARGET={s}
  {% endif %}

# ============================================================
# PRESSURE ADVANCE
# M900 K maps to Klipper's SET_PRESSURE_ADVANCE.
# ============================================================

[gcode_macro M900]
description: Set pressure advance (linear advance equivalent)
gcode:
  {% set k = params.K|default(0)|float %}
  SET_PRESSURE_ADVANCE ADVANCE={k}

# ============================================================
# SPEED / ACCELERATION LIMITS
# M201/M203/M204 map to SET_VELOCITY_LIMIT.
# ============================================================

[gcode_macro M201]
description: Set max acceleration
gcode:
  {% if params.X is defined or params.Y is defined %}
    {% set a = [params.X|default(0)|float, params.Y|default(0)|float]|max %}
    SET_VELOCITY_LIMIT ACCEL={a}
  {% endif %}

[gcode_macro M203]
description: Set max feedrate
gcode:
  {% if params.X is defined or params.Y is defined %}
    {% set v = [params.X|default(0)|float, params.Y|default(0)|float]|max %}
    SET_VELOCITY_LIMIT VELOCITY={v}
  {% endif %}

[gcode_macro M204]
description: Set print/travel acceleration
gcode:
  {% set p = params.P|default(params.S|default(0)|float)|float %}
  {% if p > 0 %}
    SET_VELOCITY_LIMIT ACCEL={p}
  {% endif %}

[gcode_macro M205]
description: Set junction deviation (square corner velocity)
gcode:
  {% if params.J is defined %}
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={params.J|float}
  {% endif %}

# ============================================================
# REMOTE HOST PRINT CONTROL
#
# Implements the BTT TFT host-action protocol so that prints
# started from Klipper / Mainsail / Fluidd are visible and
# controllable from the TFT touch screen.
#
# Features:
#   1. Switches TFT to printing mode when a print starts
#   2. Updates the progress bar (bytes read / file size)
#   3. Updates the remaining-time indicator
#   4. Updates the layer counter — requires the slicer to emit
#        SET_PRINT_STATS_INFO TOTAL_LAYER={total_layer_count}
#      in the start G-code and
#        SET_PRINT_STATS_INFO CURRENT_LAYER={current_layer}
#      at every layer change (supported by PrusaSlicer, Orca,
#      SuperSlicer, Cura via post-processor)
#   5. Reacts to TFT pause / resume / cancel button presses
#      when the TFT is in remote-host mode
#
# Protocol notes:
#   Klipper → TFT:  RESPOND PREFIX="//action:..." MSG="..."
#     The TFT firmware looks for lines starting with "//action:"
#     (no space).  RESPOND PREFIX sets the prefix; the trailing
#     space between PREFIX and MSG is harmless for the parser.
#   TFT → Klipper:  M118 P0 A1 action:notification remote pause
#     The TFT sends M118 (Marlin-style serial broadcast).
#     The M118 macro below intercepts remote-action variants and
#     triggers PAUSE / RESUME / CANCEL_PRINT accordingly.
# ============================================================

[gcode_macro _TFT_STATE]
description: Holds last-known print state for transition detection
variable_last_state: 'standby'
gcode:

[delayed_gcode _TFT_MONITOR]
initial_duration: 1
gcode:
  {% set state = printer.print_stats.state %}
  {% set last  = printer['gcode_macro _TFT_STATE'].last_state %}

  # --- lifecycle transitions ---
  {% if state == 'printing' and last != 'printing' %}
    RESPOND PREFIX="//action:print_start" MSG=""
    SET_GCODE_VARIABLE MACRO=_TFT_STATE VARIABLE=last_state VALUE="'printing'"

  {% elif state == 'paused' and last == 'printing' %}
    RESPOND PREFIX="//action:pause" MSG=""
    SET_GCODE_VARIABLE MACRO=_TFT_STATE VARIABLE=last_state VALUE="'paused'"

  {% elif state == 'printing' and last == 'paused' %}
    RESPOND PREFIX="//action:resume" MSG=""
    SET_GCODE_VARIABLE MACRO=_TFT_STATE VARIABLE=last_state VALUE="'printing'"

  {% elif state == 'complete' and last != 'standby' %}
    RESPOND PREFIX="//action:print_end" MSG=""
    SET_GCODE_VARIABLE MACRO=_TFT_STATE VARIABLE=last_state VALUE="'standby'"

  {% elif state == 'cancelled' and last != 'standby' %}
    RESPOND PREFIX="//action:cancel" MSG=""
    SET_GCODE_VARIABLE MACRO=_TFT_STATE VARIABLE=last_state VALUE="'standby'"

  {% elif state == 'standby' and last in ['printing', 'paused'] %}
    # catches complete/cancelled if the monitor missed the intermediate state
    RESPOND PREFIX="//action:print_end" MSG=""
    SET_GCODE_VARIABLE MACRO=_TFT_STATE VARIABLE=last_state VALUE="'standby'"

  {% elif state == 'standby' and last != 'standby' %}
    SET_GCODE_VARIABLE MACRO=_TFT_STATE VARIABLE=last_state VALUE="'standby'"
  {% endif %}

  # --- progress updates while active ---
  {% if state in ['printing', 'paused'] %}

    # byte progress: Data Left <pos>/<size>
    {% set file_size = printer.print_stats.file_size | int %}
    {% set file_pos  = printer.print_stats.file_position | int %}
    {% if file_size > 0 %}
      RESPOND PREFIX="//action:notification" MSG="Data Left {file_pos}/{file_size}"
    {% endif %}

    # time remaining: Time Left <h>h<m>m<s>s
    {% set duration = printer.print_stats.print_duration | float %}
    {% set progress = printer.virtual_sdcard.progress | float %}
    {% if progress > 0.001 and duration > 0 %}
      {% set remaining = ((duration / progress) - duration) | int %}
      {% set rh = (remaining // 3600) | int %}
      {% set rm = ((remaining % 3600) // 60) | int %}
      {% set rs = (remaining % 60) | int %}
      RESPOND PREFIX="//action:notification" MSG="Time Left {rh}h{rm}m{rs}s"
    {% endif %}

    # layer progress: Layer Left <current>/<total>
    # only emitted when slicer provides SET_PRINT_STATS_INFO data
    {% set cur_layer   = printer.print_stats.info.current_layer | default(0) | int %}
    {% set total_layer = printer.print_stats.info.total_layer   | default(0) | int %}
    {% if total_layer > 0 %}
      RESPOND PREFIX="//action:notification" MSG="Layer Left {cur_layer}/{total_layer}"
    {% endif %}

  {% endif %}

  # --- reschedule ---
  {% if state in ['printing', 'paused'] %}
    UPDATE_DELAYED_GCODE ID=_TFT_MONITOR DURATION=3
  {% else %}
    UPDATE_DELAYED_GCODE ID=_TFT_MONITOR DURATION=5
  {% endif %}


# ============================================================
# M118 — INTERCEPT TFT REMOTE-HOST BUTTON PRESSES
#
# When the TFT is in remote-host mode it sends:
#   M118 P0 A1 action:notification remote pause
#   M118 P0 A1 action:notification remote resume
#   M118 P0 A1 action:notification remote cancel
# rather than M25 / M24 / M524.  We intercept those here and
# trigger the Klipper equivalents.  All other M118 calls are
# forwarded to the original Klipper handler unchanged.
# ============================================================

[gcode_macro M118]
description: Intercept TFT remote-host button presses; forward all other M118 calls
rename_existing: M118.1
gcode:
  {% set raw = rawparams | lower %}
  {% if 'remote pause' in raw %}
    PAUSE
  {% elif 'remote resume' in raw %}
    RESUME
  {% elif 'remote cancel' in raw %}
    CANCEL_PRINT
  {% else %}
    M118.1 {rawparams}
  {% endif %}


# ============================================================
# MISC STUBS
# Commands with no Klipper equivalent — respond ok so the TFT
# doesn't hang waiting for an acknowledgement.
# ============================================================

[gcode_macro M108]
description: Stub M108 (break heating wait — no equivalent in Klipper)
gcode:
  RESPOND MSG="ok"

[gcode_macro M155]
description: Stub M155 (auto temp reporting — TFT polls M105 directly)
gcode:
  RESPOND MSG="ok"

[gcode_macro M211]
description: Stub M211 (software endstops — configured in printer.cfg)
gcode:
  RESPOND MSG="ok"

[gcode_macro M17]
description: Stub M17 (enable steppers — Klipper enables automatically on move)
gcode:
  RESPOND MSG="ok"
